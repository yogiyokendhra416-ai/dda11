<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAA Experiment 1 - Searching Algorithms</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h1{
    text-align:center;
    color:#0077cc;
}
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    font-size:16px;
}
button{
    padding:10px 20px;
    margin:10px 5px;
    border:none;
    color:white;
    background:#0077cc;
    cursor:pointer;
    border-radius:5px;
}
button:hover{
    background:#005fa3;
}
pre{
    background:#222;
    color:#00ff99;
    padding:15px;
    border-radius:8px;
}
</style>

</head>
<body>

<div class="container">

<h1>DAA Experiment 1</h1>
<h2>Interpolation Search & Binary Search</h2>

<label>Enter Sorted Array (comma separated)</label>
<input type="text" id="array"
placeholder="2,5,10,15,23,35,48,60">

<label>Enter Target</label>
<input type="number" id="target">

<button onclick="runBinary()">Binary Search</button>
<button onclick="runInterpolation()">Interpolation Search</button>

<h3>Output</h3>

<pre id="output"></pre>

</div>

<script>

function getArray(){
    return document.getElementById("array").value
    .split(",")
    .map(Number)
    .filter(x=>!isNaN(x));
}

function binarySearch(arr,target){

    let low=0;
    let high=arr.length-1;
    let comparisons=0;

    while(low<=high){

        comparisons++;

        let mid=Math.floor((low+high)/2);

        if(arr[mid]==target){
            return {
                index:mid,
                comparisons:comparisons
            };
        }

        else if(arr[mid]<target){
            low=mid+1;
        }

        else{
            high=mid-1;
        }

    }

    return{
        index:-1,
        comparisons:comparisons
    };

}

function interpolationSearch(arr,target){

    let low=0;
    let high=arr.length-1;
    let comparisons=0;

    while(
        low<=high &&
        target>=arr[low] &&
        target<=arr[high]
    ){

        comparisons++;

        if(low==high){

            if(arr[low]==target){

                return{
                    index:low,
                    comparisons:comparisons
                };

            }

            break;

        }

        if(arr[high]==arr[low])
            break;

        let pos=low+Math.floor(
            ((target-arr[low])*(high-low))/
            (arr[high]-arr[low])
        );

        if(arr[pos]==target){

            return{
                index:pos,
                comparisons:comparisons
            };

        }

        if(arr[pos]<target)
            low=pos+1;

        else
            high=pos-1;

    }

    return{
        index:-1,
        comparisons:comparisons
    };

}

function runBinary(){

    let arr=getArray();
    let target=Number(document.getElementById("target").value);

    let result=binarySearch(arr,target);

    document.getElementById("output").innerText=
`Binary Search

Array : ${arr}

Target : ${target}

Index : ${result.index}

Comparisons : ${result.comparisons}`;

}

function runInterpolation(){

    let arr=getArray();
    let target=Number(document.getElementById("target").value);

    let result=interpolationSearch(arr,target);

    document.getElementById("output").innerText=
`Interpolation Search

Array : ${arr}

Target : ${target}

Index : ${result.index}

Comparisons : ${result.comparisons}`;

}

</script>

</body>
</html>
