<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAA Experiment 2 - String Matching Algorithms</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h1{
    text-align:center;
    color:#0077cc;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    font-size:16px;
}
button{
    padding:10px 20px;
    margin:8px;
    background:#0077cc;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#005fa3;
}
pre{
    background:#222;
    color:#00ff99;
    padding:15px;
    border-radius:8px;
    white-space:pre-wrap;
}
</style>

</head>
<body>

<div class="container">

<h1>DAA Experiment 2</h1>
<h2>Naive, KMP and Rabin-Karp String Matching</h2>

<label>Text</label>
<input type="text" id="text" value="AABAACAADAABAABA">

<label>Pattern</label>
<input type="text" id="pattern" value="AABA">

<button onclick="runAll()">Run All Algorithms</button>

<h3>Output</h3>

<pre id="output"></pre>

</div>

<script>

function naiveSearch(text,pattern){

    let matches=[];
    let comparisons=0;

    for(let i=0;i<=text.length-pattern.length;i++){

        let j=0;

        while(j<pattern.length){

            comparisons++;

            if(text[i+j]!=pattern[j])
                break;

            j++;
        }

        if(j==pattern.length)
            matches.push(i);

    }

    return {matches,comparisons};

}

function computeLPS(pattern){

    let lps=new Array(pattern.length).fill(0);

    let len=0;
    let i=1;

    while(i<pattern.length){

        if(pattern[i]==pattern[len]){

            len++;
            lps[i]=len;
            i++;

        }

        else{

            if(len!=0){

                len=lps[len-1];

            }

            else{

                lps[i]=0;
                i++;

            }

        }

    }

    return lps;

}

function kmpSearch(text,pattern){

    let lps=computeLPS(pattern);

    let matches=[];
    let comparisons=0;

    let i=0;
    let j=0;

    while(i<text.length){

        comparisons++;

        if(pattern[j]==text[i]){
            i++;
            j++;
        }

        if(j==pattern.length){

            matches.push(i-j);
            j=lps[j-1];

        }

        else if(i<text.length && pattern[j]!=text[i]){

            if(j!=0)
                j=lps[j-1];
            else
                i++;

        }

    }

    return {matches,comparisons};

}

function rabinKarp(text,pattern){

    let matches=[];
    let comparisons=0;

    for(let i=0;i<=text.length-pattern.length;i++){

        let ok=true;

        for(let j=0;j<pattern.length;j++){

            comparisons++;

            if(text[i+j]!=pattern[j]){

                ok=false;
                break;

            }

        }

        if(ok)
            matches.push(i);

    }

    return {matches,comparisons};

}

function runAll(){

    let text=document.getElementById("text").value;
    let pattern=document.getElementById("pattern").value;

    let naive=naiveSearch(text,pattern);
    let kmp=kmpSearch(text,pattern);
    let rk=rabinKarp(text,pattern);

    document.getElementById("output").innerText=

`TEXT : ${text}

PATTERN : ${pattern}

----------------------------------------

Naive Search

Matches : ${naive.matches}

Comparisons : ${naive.comparisons}

----------------------------------------

KMP Search

Matches : ${kmp.matches}

Comparisons : ${kmp.comparisons}

----------------------------------------

Rabin-Karp

Matches : ${rk.matches}

Comparisons : ${rk.comparisons}`;

}

</script>

</body>
</html>
